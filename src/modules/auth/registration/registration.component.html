<div class="login-wrapper">

    <form [formGroup]="registerForm" (ngSubmit)="register()" class="login-card">
        <div class="logo">🛍️</div>
        <h2>🛍️ ShopEase</h2>
        <h3>Welcome Back</h3>
        <p>Sign in to continue shopping</p>

        <input type="text" formControlName="first_name" placeholder="First Name"/>
        <div class="error" *ngIf="registerForm.get('first_name')?.touched && registerForm.get('first_name')?.invalid">
            Enter valid FirstName
        </div>

        <input type="text" formControlName="last_name" placeholder="Last Name"/>
        <div class="error" *ngIf="registerForm.get('last_name')?.touched && registerForm.get('last_name')?.invalid">
            Enter valid LastName
        </div>

        <input type="email" formControlName="email" placeholder="Email"/>
        <div class="error" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
            Enter valid Email
        </div>

        <div class="password-box">
            <input
                    [type]="showPassword ? 'text' : 'password'"
                    formControlName="password"
                    placeholder="Password"
            />
            <span class="eye" (click)="togglePassword()">
        {{ showPassword ? '🙈' : '👁' }}
    </span>
        </div>

        <div class="error" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
            Password required
        </div>

        <div class="password-box">
            <input
                    [type]="showPassword ? 'text' : 'password'"
                    formControlName="confirmPassword"
                    placeholder="Confirm Password"
            />
            <span class="eye" (click)="toggleConfirmPassword()">
        {{ showConfirmPassword ? '🙈' : '👁' }}
    </span>
        </div>

        <div class="error" *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.get('confirmPassword')?.invalid">
           Confirm Password required
        </div>

        <button type="submit">
          Register
        </button>





    </form>

</div>
