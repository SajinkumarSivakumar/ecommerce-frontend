<div class="login-wrapper">

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-card">
        <div class="logo">🛍️</div>
        <h2>🛍️ ShopEase</h2>
        <h3>Welcome Back</h3>
        <p>Sign in to continue shopping</p>

        <input type="email" formControlName="email" placeholder="Email Address"/>

        <div class="error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            Enter valid email
        </div>

        <div class="password-box">
            <input
                    [type]="showPassword ? 'text' : 'password'"
                    formControlName="password"
                    placeholder="Password"
            />
            <span class="eye" (click)="togglePassword()">
        {{ showPassword ? '🙈' : '👁' }}
      </span>
        </div>

        <div class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            Password required
        </div>

        <button type="submit" [disabled]="isLoading">
            {{ isLoading ? 'Signing in...' : 'Sign In' }}
        </button>

        <p class="secure">🔒 Secure Login</p>

        <div class="register">
            Don't have an account? <a href="register">Register</a>
        </div>

    </form>

</div>
